name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'little_store_app/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'little_store_app/**'

defaults:
  run:
    working-directory: little_store_app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run settings tests
        run: flutter test test/features/settings --coverage
